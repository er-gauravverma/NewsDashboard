<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e17;
            color: #d1d5db;
            min-height: 100vh;
        }

        .header {
            background: #111827;
            border-bottom: 1px solid #1f2937;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            color: #f9fafb;
            font-size: 20px;
            font-weight: 600;
        }

        .header .subtitle {
            color: #6b7280;
            font-size: 13px;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .controls button {
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .controls button:hover {
            background: #374151;
            color: #f9fafb;
        }

        .controls button.active {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }

        .ticker-bar {
            display: flex;
            gap: 0;
            background: #111827;
            border-bottom: 1px solid #1f2937;
            overflow-x: auto;
        }

        .ticker-item {
            padding: 12px 24px;
            border-right: 1px solid #1f2937;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 180px;
            flex-shrink: 0;
        }

        .ticker-item:hover {
            background: #1a2236;
        }

        .ticker-item.active {
            background: #1a2236;
            border-bottom: 2px solid #2563eb;
        }

        .ticker-item .name {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .ticker-item .price {
            font-size: 18px;
            font-weight: 600;
            color: #f9fafb;
        }

        .ticker-item .change {
            font-size: 13px;
            margin-top: 2px;
        }

        .ticker-item .change.positive {
            color: #10b981;
        }

        .ticker-item .change.negative {
            color: #ef4444;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 0;
            height: calc(100vh - 130px);
        }

        .main-chart-area {
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .chart-header h2 {
            font-size: 16px;
            color: #f9fafb;
        }

        .chart-type-controls {
            display: flex;
            gap: 6px;
        }

        .chart-type-controls button {
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .chart-type-controls button.active {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }

        #main-chart {
            flex: 1;
            border-radius: 8px;
            overflow: hidden;
        }

        .sidebar {
            background: #111827;
            border-left: 1px solid #1f2937;
            padding: 16px;
            overflow-y: auto;
        }

        .sidebar h3 {
            font-size: 14px;
            color: #f9fafb;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1f2937;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .info-item {
            background: #1a2236;
            padding: 10px 12px;
            border-radius: 6px;
        }

        .info-item .label {
            font-size: 11px;
            color: #6b7280;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .info-item .value {
            font-size: 15px;
            font-weight: 500;
            color: #f9fafb;
        }

        .mini-charts {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mini-chart-container {
            background: #1a2236;
            border-radius: 6px;
            padding: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .mini-chart-container:hover {
            background: #1f2b42;
        }

        .mini-chart-container .mini-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .mini-chart-container .mini-name {
            font-size: 12px;
            color: #9ca3af;
        }

        .mini-chart-container .mini-price {
            font-size: 13px;
            font-weight: 500;
            color: #f9fafb;
        }

        .mini-chart-container .mini-change {
            font-size: 11px;
        }

        .mini-chart-box {
            height: 50px;
            width: 100%;
        }

        .indicator-section {
            margin-top: 16px;
        }

        .indicator-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1f2937;
        }

        .indicator-toggle label {
            font-size: 13px;
            color: #d1d5db;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: #374151;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            left: 2px;
            bottom: 2px;
            background: #f9fafb;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: #2563eb;
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(16px);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 14, 23, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1f2937;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .sidebar {
                border-left: none;
                border-top: 1px solid #1f2937;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>Trading Dashboard</h1>
            <div class="subtitle">Live market data from MetaTrader 5</div>
        </div>
        <div class="controls" id="timeframe-controls">
            <button data-tf="M1">1m</button>
            <button data-tf="M5">5m</button>
            <button data-tf="M15">15m</button>
            <button data-tf="H1">1H</button>
            <button data-tf="D1" class="active">1D</button>
        </div>
    </div>

    <div class="ticker-bar" id="ticker-bar"></div>

    <div class="dashboard">
        <div class="main-chart-area">
            <div class="chart-header">
                <h2 id="chart-title">Loading...</h2>
                <div class="chart-type-controls" id="chart-type-controls">
                    <button data-type="candlestick" class="active">Candles</button>
                    <button data-type="line">Line</button>
                    <button data-type="area">Area</button>
                </div>
            </div>
            <div id="main-chart" style="position: relative; flex: 3;"></div>
            <div id="qqe-chart" style="position: relative; flex: 1; border-top: 1px solid #1f2937; display: none;"></div>
        </div>

        <div class="sidebar">
            <h3>Market Info</h3>
            <div class="info-grid" id="info-grid">
                <div class="info-item"><div class="label">Open</div><div class="value" id="info-open">--</div></div>
                <div class="info-item"><div class="label">High</div><div class="value" id="info-high">--</div></div>
                <div class="info-item"><div class="label">Low</div><div class="value" id="info-low">--</div></div>
                <div class="info-item"><div class="label">Volume</div><div class="value" id="info-volume">--</div></div>
                <div class="info-item"><div class="label">Bid</div><div class="value" id="info-bid">--</div></div>
                <div class="info-item"><div class="label">Ask</div><div class="value" id="info-ask">--</div></div>
                <div class="info-item" style="grid-column: span 2;"><div class="label">Spread</div><div class="value" id="info-spread">--</div></div>
            </div>

            <div class="indicator-section">
                <h3>Technical Indicators</h3>
                <div class="indicator-toggle">
                    <label for="sma20">SMA 20</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="sma20" checked>
                        <span class="toggle-slider"></span>
                    </div>
                </div>
                <div class="indicator-toggle">
                    <label for="sma150">SMA 150</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="sma150" checked>
                        <span class="toggle-slider"></span>
                    </div>
                </div>
                <div class="indicator-toggle">
                    <label for="ema20">EMA 20</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="ema20">
                        <span class="toggle-slider"></span>
                    </div>
                </div>
                <div class="indicator-toggle">
                    <label for="bb">Bollinger Bands</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="bb">
                        <span class="toggle-slider"></span>
                    </div>
                </div>
                <div class="indicator-toggle">
                    <label for="qqe">QQE</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="qqe" checked>
                        <span class="toggle-slider"></span>
                    </div>
                </div>
            </div>

            <div class="mini-charts" id="mini-charts" style="margin-top: 16px;">
                <h3>Other Markets</h3>
            </div>
        </div>
    </div>

    <script>
    const API_BASE = '';
    const INSTRUMENTS = ['GOLD', 'OIL', 'EURUSD', 'NATGAS', 'NASDAQ100'];
    const COLORS = {
        GOLD: '#f59e0b',
        OIL: '#8b5cf6',
        EURUSD: '#3b82f6',
        NATGAS: '#10b981',
        NASDAQ100: '#ec4899',
    };

    let state = {
        activeInstrument: 'GOLD',
        timeframe: 'D1',
        chartType: 'candlestick',
        chartData: {},
        quotes: {},
        mainChart: null,
        mainSeries: null,
        sma20Series: null,
        sma150Series: null,
        ema20Series: null,
        bbUpperSeries: null,
        bbLowerSeries: null,
        qqeChart: null,
        qqeRsiMaSeries: null,
        qqeFastTLSeries: null,
        qqeHistSeries: null,
        qqeUpperSeries: null,
        qqeLowerSeries: null,
        qqeZeroSeries: null,
    };

    // --- Utility Functions ---

    function calculateSMA(data, period) {
        const result = [];
        for (let i = period - 1; i < data.length; i++) {
            let sum = 0;
            for (let j = 0; j < period; j++) {
                sum += data[i - j].close;
            }
            result.push({ time: data[i].time, value: sum / period });
        }
        return result;
    }

    function calculateEMA(data, period) {
        const result = [];
        const multiplier = 2 / (period + 1);
        let sum = 0;
        for (let i = 0; i < period; i++) {
            sum += data[i].close;
        }
        let ema = sum / period;
        result.push({ time: data[period - 1].time, value: ema });

        for (let i = period; i < data.length; i++) {
            ema = (data[i].close - ema) * multiplier + ema;
            result.push({ time: data[i].time, value: ema });
        }
        return result;
    }

    function calculateBollingerBands(data, period = 20, stdDev = 2) {
        const upper = [];
        const lower = [];
        for (let i = period - 1; i < data.length; i++) {
            let sum = 0;
            for (let j = 0; j < period; j++) {
                sum += data[i - j].close;
            }
            const mean = sum / period;
            let variance = 0;
            for (let j = 0; j < period; j++) {
                variance += Math.pow(data[i - j].close - mean, 2);
            }
            const std = Math.sqrt(variance / period);
            upper.push({ time: data[i].time, value: mean + stdDev * std });
            lower.push({ time: data[i].time, value: mean - stdDev * std });
        }
        return { upper, lower };
    }

    function calculateRSI(closes, period) {
        const rsi = new Array(closes.length).fill(0);
        let gainSum = 0, lossSum = 0;
        for (let i = 1; i <= period; i++) {
            const diff = closes[i] - closes[i - 1];
            if (diff > 0) gainSum += diff;
            else lossSum -= diff;
        }
        let avgGain = gainSum / period;
        let avgLoss = lossSum / period;
        rsi[period] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
        for (let i = period + 1; i < closes.length; i++) {
            const diff = closes[i] - closes[i - 1];
            const gain = diff > 0 ? diff : 0;
            const loss = diff < 0 ? -diff : 0;
            avgGain = (avgGain * (period - 1) + gain) / period;
            avgLoss = (avgLoss * (period - 1) + loss) / period;
            rsi[i] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
        }
        return rsi;
    }

    function emaArray(arr, period, startIdx) {
        // Mimics PineScript ema() — starts immediately from startIdx
        const result = new Array(arr.length).fill(0);
        const mult = 2 / (period + 1);
        result[startIdx] = arr[startIdx];
        for (let i = startIdx + 1; i < arr.length; i++) {
            result[i] = (arr[i] - result[i - 1]) * mult + result[i - 1];
        }
        return result;
    }

    function calculateQQE(data, rsiPeriod = 14, sf = 5, qqeFactor = 4.238, threshold = 10) {
        const closes = data.map(d => d.close);
        const times = data.map(d => d.time);
        const n = closes.length;

        // Step 1: RSI
        const rsi = calculateRSI(closes, rsiPeriod);

        // Step 2: Smoothed RSI = EMA(RSI, SF)
        const rsiMa = emaArray(rsi, sf, rsiPeriod);

        const startIdx = rsiPeriod;
        const wildersPeriod = rsiPeriod * 2 - 1;

        // Step 3: AtrRsi = abs(RsiMa[1] - RsiMa)
        const atrRsi = new Array(n).fill(0);
        for (let i = startIdx + 1; i < n; i++) {
            atrRsi[i] = Math.abs(rsiMa[i - 1] - rsiMa[i]);
        }

        // Step 4: MaAtrRsi = EMA(AtrRsi, Wilders_Period)
        const maAtrRsi = emaArray(atrRsi, wildersPeriod, startIdx + 1);

        // Step 5: dar = EMA(MaAtrRsi, Wilders_Period) * QQE
        const dar = emaArray(maAtrRsi, wildersPeriod, startIdx + 1);
        for (let i = 0; i < n; i++) {
            dar[i] *= qqeFactor;
        }

        // Step 6: Calculate bands and trend
        const longband = new Array(n).fill(0);
        const shortband = new Array(n).fill(0);
        const trend = new Array(n).fill(1);
        const fastTL = new Array(n).fill(0);

        const calcStart = startIdx + 2;

        for (let i = calcStart; i < n; i++) {
            const rsIndex = rsiMa[i];
            const delta = dar[i];
            const newLongband = rsIndex - delta;
            const newShortband = rsIndex + delta;

            longband[i] = (rsiMa[i - 1] > longband[i - 1] && rsIndex > longband[i - 1])
                ? Math.max(longband[i - 1], newLongband) : newLongband;
            shortband[i] = (rsiMa[i - 1] < shortband[i - 1] && rsIndex < shortband[i - 1])
                ? Math.min(shortband[i - 1], newShortband) : newShortband;

            if (rsiMa[i] > shortband[i - 1] && rsiMa[i - 1] <= shortband[i - 1]) {
                trend[i] = 1;
            } else if (rsiMa[i] < longband[i - 1] && rsiMa[i - 1] >= longband[i - 1]) {
                trend[i] = -1;
            } else {
                trend[i] = trend[i - 1];
            }

            fastTL[i] = trend[i] === 1 ? longband[i] : shortband[i];
        }

        // Build output arrays (offset by -50 like PineScript)
        const rsiMaLine = [];
        const fastTLLine = [];
        const histogram = [];

        for (let i = calcStart; i < n; i++) {
            const rsiVal = rsiMa[i] - 50;
            const tlVal = fastTL[i] - 50;
            rsiMaLine.push({ time: times[i], value: rsiVal });
            fastTLLine.push({ time: times[i], value: tlVal });

            let color;
            if (rsiVal > threshold) color = '#10b981';
            else if (rsiVal < -threshold) color = '#ef4444';
            else color = '#f59e0b';

            histogram.push({ time: times[i], value: rsiVal, color: color });
        }

        return { rsiMaLine, fastTLLine, histogram, threshold };
    }

    function formatNumber(num, decimals = 2) {
        if (num === undefined || num === null) return '--';
        return num.toLocaleString(undefined, {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals,
        });
    }

    function formatVolume(num) {
        if (!num) return '--';
        if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
        if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
        if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
        return num.toString();
    }

    // --- Data Fetching ---

    async function fetchHistory(instrument, timeframe) {
        const res = await fetch(`${API_BASE}/api/history/${instrument}?timeframe=${timeframe}`);
        if (!res.ok) throw new Error('Failed to fetch data');
        return await res.json();
    }

    async function fetchQuote(instrument) {
        const res = await fetch(`${API_BASE}/api/quote/${instrument}`);
        if (!res.ok) throw new Error('Failed to fetch quote');
        return await res.json();
    }

    // --- Chart Creation ---

    function createMainChart() {
        const container = document.getElementById('main-chart');
        container.innerHTML = '';

        const chart = LightweightCharts.createChart(container, {
            layout: {
                background: { type: 'solid', color: '#0a0e17' },
                textColor: '#6b7280',
            },
            grid: {
                vertLines: { color: '#1f2937' },
                horzLines: { color: '#1f2937' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
                vertLine: { color: '#374151', labelBackgroundColor: '#2563eb' },
                horzLine: { color: '#374151', labelBackgroundColor: '#2563eb' },
            },
            rightPriceScale: {
                borderColor: '#1f2937',
            },
            timeScale: {
                borderColor: '#1f2937',
                timeVisible: true,
                secondsVisible: false,
            },
            handleScroll: true,
            handleScale: true,
        });

        new ResizeObserver(entries => {
            const { width, height } = entries[0].contentRect;
            chart.applyOptions({ width, height });
        }).observe(container);

        state.mainChart = chart;
        return chart;
    }

    function setMainSeries(data, type) {
        // Destroy old charts
        if (state.mainChart) {
            state.mainChart.remove();
            state.mainChart = null;
            state.mainSeries = null;
            state.sma20Series = null;
            state.sma150Series = null;
            state.ema20Series = null;
            state.bbUpperSeries = null;
            state.bbLowerSeries = null;
        }
        if (state.qqeChart) {
            state.qqeChart.remove();
            state.qqeChart = null;
            state.qqeRsiMaSeries = null;
            state.qqeFastTLSeries = null;
            state.qqeHistSeries = null;
        }

        const chart = createMainChart();
        const color = COLORS[state.activeInstrument] || '#3b82f6';

        if (type === 'candlestick') {
            state.mainSeries = chart.addCandlestickSeries({
                upColor: '#10b981',
                downColor: '#ef4444',
                borderUpColor: '#10b981',
                borderDownColor: '#ef4444',
                wickUpColor: '#10b981',
                wickDownColor: '#ef4444',
            });
            state.mainSeries.setData(data);
        } else if (type === 'line') {
            state.mainSeries = chart.addLineSeries({
                color: color,
                lineWidth: 2,
            });
            state.mainSeries.setData(data.map(d => ({ time: d.time, value: d.close })));
        } else if (type === 'area') {
            state.mainSeries = chart.addAreaSeries({
                topColor: color + '40',
                bottomColor: color + '05',
                lineColor: color,
                lineWidth: 2,
            });
            state.mainSeries.setData(data.map(d => ({ time: d.time, value: d.close })));
        }

        // Apply overlay indicators
        applyIndicators(chart, data);

        chart.timeScale().fitContent();

        // QQE pane
        applyQQE(data);
    }

    function removeIndicators() {
        const chart = state.mainChart;
        if (!chart) return;
        ['sma20Series', 'sma150Series', 'ema20Series', 'bbUpperSeries', 'bbLowerSeries'].forEach(key => {
            if (state[key]) {
                chart.removeSeries(state[key]);
                state[key] = null;
            }
        });
    }

    function applyIndicators(chart, data) {
        if (!chart) return;

        if (document.getElementById('sma20').checked && data.length >= 20) {
            state.sma20Series = chart.addLineSeries({ color: '#f59e0b', lineWidth: 1, title: 'SMA 20' });
            state.sma20Series.setData(calculateSMA(data, 20));
        }
        if (document.getElementById('sma150').checked && data.length >= 150) {
            state.sma150Series = chart.addLineSeries({ color: '#8b5cf6', lineWidth: 1, title: 'SMA 150' });
            state.sma150Series.setData(calculateSMA(data, 150));
        }
        if (document.getElementById('ema20').checked && data.length >= 20) {
            state.ema20Series = chart.addLineSeries({ color: '#ec4899', lineWidth: 1, title: 'EMA 20' });
            state.ema20Series.setData(calculateEMA(data, 20));
        }
        if (document.getElementById('bb').checked && data.length >= 20) {
            const bb = calculateBollingerBands(data);
            state.bbUpperSeries = chart.addLineSeries({ color: '#6366f1', lineWidth: 1, lineStyle: 2, title: 'BB Upper' });
            state.bbUpperSeries.setData(bb.upper);
            state.bbLowerSeries = chart.addLineSeries({ color: '#6366f1', lineWidth: 1, lineStyle: 2, title: 'BB Lower' });
            state.bbLowerSeries.setData(bb.lower);
        }
    }

    function applyQQE(data) {
        const qqeContainer = document.getElementById('qqe-chart');
        const showQQE = document.getElementById('qqe').checked;

        if (!showQQE || data.length < 100) {
            qqeContainer.style.display = 'none';
            return;
        }

        qqeContainer.style.display = 'block';
        qqeContainer.innerHTML = '';

        const qqeChart = LightweightCharts.createChart(qqeContainer, {
            layout: {
                background: { type: 'solid', color: '#0a0e17' },
                textColor: '#6b7280',
            },
            grid: {
                vertLines: { color: '#1f2937' },
                horzLines: { color: '#1f2937' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
                vertLine: { color: '#374151', labelBackgroundColor: '#2563eb' },
                horzLine: { color: '#374151', labelBackgroundColor: '#2563eb' },
            },
            rightPriceScale: { borderColor: '#1f2937' },
            timeScale: {
                borderColor: '#1f2937',
                timeVisible: true,
                secondsVisible: false,
            },
            handleScroll: true,
            handleScale: true,
        });

        new ResizeObserver(entries => {
            const { width, height } = entries[0].contentRect;
            qqeChart.applyOptions({ width, height });
        }).observe(qqeContainer);

        state.qqeChart = qqeChart;

        const qqe = calculateQQE(data);

        // Histogram (colored columns)
        state.qqeHistSeries = qqeChart.addHistogramSeries({
            priceScaleId: 'right',
            priceFormat: { type: 'price', precision: 2 },
        });
        state.qqeHistSeries.setData(qqe.histogram);

        // Smooth RSI line (orange)
        state.qqeRsiMaSeries = qqeChart.addLineSeries({
            color: '#f59e0b',
            lineWidth: 2,
            title: 'Smooth RSI',
        });
        state.qqeRsiMaSeries.setData(qqe.rsiMaLine);

        // Fast ATR RSI TL (blue)
        state.qqeFastTLSeries = qqeChart.addLineSeries({
            color: '#3b82f6',
            lineWidth: 2,
            title: 'QQE Signal',
        });
        state.qqeFastTLSeries.setData(qqe.fastTLLine);

        // Threshold lines
        const threshData = qqe.rsiMaLine.map(d => d.time);
        const upperLine = threshData.map(t => ({ time: t, value: qqe.threshold }));
        const lowerLine = threshData.map(t => ({ time: t, value: -qqe.threshold }));
        const zeroLine = threshData.map(t => ({ time: t, value: 0 }));

        qqeChart.addLineSeries({ color: '#10b981', lineWidth: 1, lineStyle: 2, title: '' })
            .setData(upperLine);
        qqeChart.addLineSeries({ color: '#ef4444', lineWidth: 1, lineStyle: 2, title: '' })
            .setData(lowerLine);
        qqeChart.addLineSeries({ color: '#6b7280', lineWidth: 1, lineStyle: 1, title: '' })
            .setData(zeroLine);

        qqeChart.timeScale().fitContent();

        // Sync time scales between main chart and QQE chart
        state.mainChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
            if (range) state.qqeChart?.timeScale().setVisibleLogicalRange(range);
        });
        qqeChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
            if (range) state.mainChart?.timeScale().setVisibleLogicalRange(range);
        });
    }

    function createMiniChart(container, data, color) {
        container.innerHTML = '';
        const chart = LightweightCharts.createChart(container, {
            width: container.clientWidth,
            height: 50,
            layout: { background: { type: 'solid', color: 'transparent' }, textColor: 'transparent' },
            grid: { vertLines: { visible: false }, horzLines: { visible: false } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Hidden },
            rightPriceScale: { visible: false },
            timeScale: { visible: false },
            handleScroll: false,
            handleScale: false,
        });

        const series = chart.addAreaSeries({
            topColor: color + '30',
            bottomColor: color + '05',
            lineColor: color,
            lineWidth: 1.5,
        });
        series.setData(data.map(d => ({ time: d.time, value: d.close })));
        chart.timeScale().fitContent();
        return chart;
    }

    // --- UI Updates ---

    function updateTickerBar() {
        const bar = document.getElementById('ticker-bar');
        bar.innerHTML = '';

        INSTRUMENTS.forEach(key => {
            const quote = state.quotes[key];
            const item = document.createElement('div');
            item.className = `ticker-item ${key === state.activeInstrument ? 'active' : ''}`;
            item.onclick = () => selectInstrument(key);

            const name = quote?.name || key;
            const decimals = key === 'EURUSD' ? 5 : 2;
            const price = quote?.price != null ? formatNumber(quote.price, decimals) : '--';
            const change = quote?.change;
            const changePct = quote?.changePct;
            const isPositive = change >= 0;

            item.innerHTML = `
                <div class="name">${name}</div>
                <div class="price">${price}</div>
                <div class="change ${isPositive ? 'positive' : 'negative'}">
                    ${change != null ? (isPositive ? '+' : '') + formatNumber(change, decimals) : '--'}
                    ${changePct != null ? '(' + (isPositive ? '+' : '') + changePct + '%)' : ''}
                </div>
            `;
            bar.appendChild(item);
        });
    }

    function updateInfoPanel(quote) {
        const decimals = state.activeInstrument === 'EURUSD' ? 5 : 2;
        document.getElementById('info-open').textContent = quote?.open != null ? formatNumber(quote.open, decimals) : '--';
        document.getElementById('info-high').textContent = quote?.high != null ? formatNumber(quote.high, decimals) : '--';
        document.getElementById('info-low').textContent = quote?.low != null ? formatNumber(quote.low, decimals) : '--';
        document.getElementById('info-volume').textContent = quote?.volume != null ? formatVolume(quote.volume) : '--';
        document.getElementById('info-bid').textContent = quote?.bid != null ? formatNumber(quote.bid, decimals) : '--';
        document.getElementById('info-ask').textContent = quote?.ask != null ? formatNumber(quote.ask, decimals) : '--';
        document.getElementById('info-spread').textContent = quote?.spread != null ? formatNumber(quote.spread, decimals) : '--';
    }

    function updateMiniCharts() {
        const container = document.getElementById('mini-charts');
        const otherInstruments = INSTRUMENTS.filter(k => k !== state.activeInstrument);

        while (container.children.length > 1) {
            container.removeChild(container.lastChild);
        }

        otherInstruments.forEach(key => {
            const data = state.chartData[key];
            const quote = state.quotes[key];
            if (!data || !data.data) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'mini-chart-container';
            wrapper.onclick = () => selectInstrument(key);

            const change = quote?.changePct;
            const isPositive = change >= 0;
            const decimals = key === 'EURUSD' ? 5 : 2;

            wrapper.innerHTML = `
                <div class="mini-header">
                    <span class="mini-name">${quote?.name || key}</span>
                    <div>
                        <span class="mini-price">${quote?.price != null ? formatNumber(quote.price, decimals) : '--'}</span>
                        <span class="mini-change ${isPositive ? 'positive' : 'negative'}">
                            ${change != null ? (isPositive ? '+' : '') + change + '%' : ''}
                        </span>
                    </div>
                </div>
                <div class="mini-chart-box"></div>
            `;
            container.appendChild(wrapper);

            const chartBox = wrapper.querySelector('.mini-chart-box');
            setTimeout(() => {
                createMiniChart(chartBox, data.data, COLORS[key]);
            }, 50);
        });
    }

    // --- Actions ---

    async function selectInstrument(key) {
        state.activeInstrument = key;
        document.getElementById('chart-title').textContent = state.quotes[key]?.name || key;

        updateTickerBar();
        updateInfoPanel(state.quotes[key]);

        if (!state.chartData[key]) {
            await loadInstrumentData(key);
        }

        const data = state.chartData[key]?.data;
        if (data) {
            setMainSeries(data, state.chartType);
        }
        updateMiniCharts();
    }

    async function loadInstrumentData(key) {
        try {
            const [history, quote] = await Promise.all([
                fetchHistory(key, state.timeframe),
                fetchQuote(key),
            ]);
            state.chartData[key] = history;
            state.quotes[key] = quote;
        } catch (e) {
            console.error(`Failed to load ${key}:`, e);
        }
    }

    async function loadAllData() {
        const container = document.getElementById('main-chart');
        container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';

        await Promise.all(INSTRUMENTS.map(key => loadInstrumentData(key)));

        updateTickerBar();
        await selectInstrument(state.activeInstrument);
    }

    async function changeTimeframe(tf) {
        state.timeframe = tf;
        state.chartData = {};
        await loadAllData();
    }

    // --- Event Listeners ---

    document.getElementById('timeframe-controls').addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;

        document.querySelectorAll('#timeframe-controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        changeTimeframe(btn.dataset.tf);
    });

    document.getElementById('chart-type-controls').addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;

        document.querySelectorAll('#chart-type-controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        state.chartType = btn.dataset.type;
        const data = state.chartData[state.activeInstrument]?.data;
        if (data && state.mainChart) {
            setMainSeries(data, state.chartType);
        }
    });

    // Indicator toggles
    ['sma20', 'sma150', 'ema20', 'bb'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => {
            const data = state.chartData[state.activeInstrument]?.data;
            if (data && state.mainChart) {
                removeIndicators();
                applyIndicators(state.mainChart, data);
            }
        });
    });

    document.getElementById('qqe').addEventListener('change', () => {
        const data = state.chartData[state.activeInstrument]?.data;
        if (data) {
            if (state.qqeChart) {
                state.qqeChart.remove();
                state.qqeChart = null;
            }
            applyQQE(data);
        }
    });

    // --- Init ---
    loadAllData();
    </script>
</body>
</html>
